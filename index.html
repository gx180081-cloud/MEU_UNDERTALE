<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ficha RPG</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f4;
    }
    h1 {
      margin-top: 20px;
    }
    .atributos {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 30px;
    }
    .atributo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background-color: #ddd;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .atributo:hover {
      background-color: #bbb;
    }
    #resultado {
      margin-top: 30px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Atributos</h1>
  <div class="atributos">
    <div class="atributo" onclick="rolar('FORÇA')">FORÇA</div>
    <div class="atributo" onclick="rolar('INTELECTO')">INTELECTO</div>
    <div class="atributo" onclick="rolar('AGILIDADE')">AGILIDADE</div>
    <div class="atributo" onclick="rolar('PRESENÇA')">PRESENÇA</div>
    <div class="atributo" onclick="rolar('VIGOR')">VIGOR</div>
  </div>

  <p id="resultado">Clique em um atributo para rolar!</p>

  <script src="script.js"></script>
</body>
</html>
